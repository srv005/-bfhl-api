<!DOCTYPE html>
<html>
<head>
  <title>BFHL API Tester</title>
</head>
<body>

<h2>BFHL API Tester</h2>

<textarea id="input" rows="5" cols="40">
["A->B","A->C","B->D"]
</textarea>
<br><br>

<button onclick="sendRequest()">Send Request</button>

<pre id="output"></pre>

<script>
async function sendRequest() {
  const raw = document.getElementById("input").value;

  let dataArray;
  try {
    dataArray = JSON.parse(raw);
  } catch (e) {
    alert("Invalid JSON format");
    return;
  }

  const response = await fetch("https://bfhl-api-3147.onrender.com/bfhl", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      data: dataArray
    })
  });

  const result = await response.json();
  document.getElementById("output").innerText = JSON.stringify(result, null, 2);
}
</script>

</body>
</html>
